<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="錦25バス">
<meta name="theme-color" content="#0f172a">
<title>錦25バス 時刻</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #0f172a;
  color: #f1f5f9;
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding-bottom: 3rem;
}

/* ヘッダー */
#header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #1e293b;
  border-bottom: 1px solid #334155;
  padding: 0.65rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#dayBadge {
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.3rem 0.85rem;
  border-radius: 999px;
  background: #2563eb;
  letter-spacing: 0.05em;
}
#dayBadge.sat { background: #7c3aed; }
#dayBadge.hol { background: #dc2626; }

#clock {
  font-size: 1.45rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
}

/* 現在地ボタン */
#locBtn {
  display: block;
  width: calc(100% - 2rem);
  margin: 1rem auto;
  padding: 0.875rem 1rem;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 14px;
  color: #f1f5f9;
  font-size: 0.95rem;
  cursor: pointer;
  text-align: center;
  transition: background 0.12s, border-color 0.12s;
  -webkit-appearance: none;
}
#locBtn:active { background: #162030; }
#locBtn.on { border-color: #3b82f6; background: rgba(59,130,246,0.12); color: #93c5fd; }
#locBtn:disabled { opacity: 0.6; }

/* ルート一覧 */
#routes {
  padding: 0 1rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* セクションラベル */
.sec-label {
  font-size: 0.72rem;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.25rem 0.1rem 0;
}

/* カード */
.card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 0.9rem 1rem;
  overflow: hidden;
}
.card.feat {
  border-color: #3b82f6;
  background: linear-gradient(145deg, #1e293b 0%, #1a2c4a 100%);
}

/* カードヘッド */
.card-head {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 0.8rem;
}
.route-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: #e2e8f0;
}
.card.feat .route-name {
  font-size: 1.25rem;
  color: #f1f5f9;
}
.arrow { color: #60a5fa; }
.feat-badge {
  font-size: 0.68rem;
  background: #1d4ed8;
  border-radius: 999px;
  padding: 0.12rem 0.5rem;
  color: #bfdbfe;
  flex-shrink: 0;
}

/* バスリスト */
.bus-list { display: flex; flex-direction: column; gap: 0.6rem; }

.bus-row {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
}
.bus-no {
  font-size: 0.7rem;
  color: #64748b;
  font-weight: 600;
  min-width: 1.6rem;
  flex-shrink: 0;
}

/* 1便目ラッパー */
.cdown-wrapper {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.35rem;
  line-height: 1.1;
}

/* 1便目 発車時刻 */
.cdown-time {
  font-size: 2rem;
  font-weight: 800;
  color: #f1f5f9;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  word-break: keep-all;
}
.card.feat .cdown-time {
  font-size: 2.6rem;
}

/* 1便目 カウントダウン */
.cdown {
  font-size: 1rem;
  font-weight: 700;
  color: #fbbf24;
  font-variant-numeric: tabular-nums;
  word-break: keep-all;
}
.cdown.urgent { color: #4ade80; }
.card.feat .cdown {
  font-size: 1.25rem;
}

/* 2・3便目 */
.bus-time-row { display: flex; align-items: baseline; gap: 0.25rem; flex-wrap: wrap; }
.btime {
  font-size: 1.05rem;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: #e2e8f0;
}
.card.feat .btime { font-size: 1.2rem; }
.bremain { font-size: 0.82rem; color: #64748b; }

/* 運行終了 */
.ended { color: #475569; font-size: 0.88rem; padding: 0.5rem 0; }

/* 運行状況ボタン */
.status-btn {
  display: block;
  margin-top: 0.75rem;
  padding: 0.45rem 0;
  text-align: center;
  font-size: 0.78rem;
  color: #60a5fa;
  border-top: 1px solid #334155;
  text-decoration: none;
  letter-spacing: 0.03em;
}
.status-btn:active { opacity: 0.6; }
</style>
</head>

// バス停座標 (GPS)
// ================================================================
const STOPS = {
  kasai:    { lat: 35.6698, lng: 139.8700 }, // 葛西駅前
  funabori: { lat: 35.6875, lng: 139.8665 }, // 船堀駅前
  sankaku:  { lat: 35.6755, lng: 139.8745 }  // 三角
};

// ================================================================
// ユーティリティ
// ================================================================

function pad(n) { return String(n).padStart(2, '0'); }

function dateKey(d) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function getDayType(d = new Date()) {
  const dow = d.getDay();
  if (dow === 0 || HOLIDAYS.has(dateKey(d))) return 'holiday';
  if (dow === 6) return 'saturday';
  return 'weekday';
}

function parseTimeSec(s) {
  const [h, m] = s.split(':').map(Number);
  return h * 3600 + m * 60;
}

function nowSec() {
  const d = new Date();
  return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
}

function getUpcoming(routeId, count = 3) {
  const ns = nowSec();
  const dt = getDayType();
  return (TT[routeId][dt] || [])
    .map(t => ({ label: t, sec: parseTimeSec(t) }))
    .filter(b => b.sec > ns)
    .slice(0, count);
}

function formatCountdown(remSec) {
  if (remSec < 60) return `あと${remSec}秒`;
  const m = Math.floor(remSec / 60);
  const s = remSec % 60;
  if (m >= 60) return `あと${m}分`;
  return `あと${m}分${pad(s)}秒`;
}

function haversine(la1, ln1, la2, ln2) {
  const R = 6371000, f = Math.PI / 180;
  const dLa = (la2 - la1) * f, dLn = (ln2 - ln1) * f;
  const a = Math.sin(dLa / 2) ** 2
    + Math.cos(la1 * f) * Math.cos(la2 * f) * Math.sin(dLn / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ================================================================
// 状態
// ================================================================
let priority = null; // null | 'kasai' | 'funabori' | 'sankaku'

// ================================================================
// 描画
// ================================================================

function renderAll() {
  // 曜日バッジ更新
  const dt = getDayType();
  const badge = document.getElementById('dayBadge');
  badge.textContent = { weekday: '平日', saturday: '土曜', holiday: '休日' }[dt];
  badge.className = { weekday: '', saturday: ' sat', holiday: ' hol' }[dt];

  const root = document.getElementById('routes');
  root.innerHTML = '';

  if (priority === null) {
    // デフォルト: 全ルートを均等表示
    ['SA-KA', 'KA-SA', 'SA-FU', 'FU-SA'].forEach(id => root.appendChild(makeCard(id, false)));

  } else if (priority === 'sankaku') {
    // 三角付近: SA-KA と SA-FU を全幅で強調
    root.appendChild(makeCard('SA-KA', true));
    root.appendChild(makeCard('SA-FU', true));

    const lbl = document.createElement('div');
    lbl.className = 'sec-label';
    lbl.textContent = 'その他のルート';
    root.appendChild(lbl);

    root.appendChild(makeCard('KA-SA', false));
    root.appendChild(makeCard('FU-SA', false));

  } else {
    const order = priority === 'kasai'
      ? ['KA-SA', 'SA-KA', 'SA-FU', 'FU-SA']
      : ['FU-SA', 'SA-FU', 'KA-SA', 'SA-KA'];

    // 1便目を全幅・強調表示
    root.appendChild(makeCard(order[0], true));

    const lbl = document.createElement('div');
    lbl.className = 'sec-label';
    lbl.textContent = 'その他のルート';
    root.appendChild(lbl);

    order.slice(1).forEach(id => root.appendChild(makeCard(id, false)));
  }
}

function makeCard(routeId, featured) {
  const buses = getUpcoming(routeId);
  const parts = TT[routeId].label.split('→');

  const card = document.createElement('div');
  card.className = 'card' + (featured ? ' feat' : '');

  // ヘッダー
  const head = document.createElement('div');
  head.className = 'card-head';

  const rname = document.createElement('span');
  rname.className = 'route-name';
  rname.innerHTML = `${parts[0]}<span class="arrow">→</span>${parts[1]}`;
  head.appendChild(rname);

  if (featured) {
    const fb = document.createElement('span');
    fb.className = 'feat-badge';
    fb.textContent = '★ 最寄り';
    head.appendChild(fb);
  }
  card.appendChild(head);

  // バスリスト
  const list = document.createElement('div');
  list.className = 'bus-list';

  if (buses.length === 0) {
    const e = document.createElement('div');
    e.className = 'ended';
    e.textContent = '本日の運行は終了しました';
    list.appendChild(e);
  } else {
    const ns = nowSec();

    buses.forEach((b, i) => {
      const row = document.createElement('div');
      row.className = 'bus-row';

      const no = document.createElement('span');
      no.className = 'bus-no';
      no.textContent = `${i + 1}便`;
      row.appendChild(no);

      const info = document.createElement('div');

      if (i === 0) {
        // 1便目: 発車時刻 + カウントダウン
        const remSec = b.sec - ns;
        const wrapper = document.createElement('div');
        wrapper.className = 'cdown-wrapper';

        const timeEl = document.createElement('span');
        timeEl.className = 'cdown-time';
        timeEl.textContent = b.label;

        const cdEl = document.createElement('span');
        cdEl.className = 'cdown' + (remSec < 120 ? ' urgent' : '');
        cdEl.id = `cd-${routeId}`;
        cdEl.dataset.sec = b.sec;
        cdEl.dataset.depLabel = b.label;
        cdEl.textContent = `（${formatCountdown(remSec)}）`;

        wrapper.appendChild(timeEl);
        wrapper.appendChild(cdEl);
        info.appendChild(wrapper);
      } else {
        // 2・3便目: 時刻 + 分単位
        const remMin = Math.max(1, Math.round((b.sec - ns) / 60));
        const tr = document.createElement('div');
        tr.className = 'bus-time-row';
        tr.innerHTML = `<span class="btime">${b.label}</span><span class="bremain">（あと${remMin}分）</span>`;
        info.appendChild(tr);
      }

      row.appendChild(info);
      list.appendChild(row);
    });
  }

  card.appendChild(list);

  // 運行状況ボタン
  const statusBtn = document.createElement('a');
  statusBtn.className = 'status-btn';
  statusBtn.textContent = '🔍 運行状況を確認（都営バス公式）';
  statusBtn.target = '_blank';
  statusBtn.rel = 'noopener noreferrer';
  statusBtn.addEventListener('click', () => {
    statusBtn.href = STATUS_URLS[routeId]();
  });
  card.appendChild(statusBtn);

  return card;
}

// ================================================================
// 毎秒: カウントダウンのみ更新
// ================================================================
function tickCountdown() {
  const ns = nowSec();
  const now = new Date();

  // 時計更新
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // カウントダウン更新
  document.querySelectorAll('[id^="cd-"]').forEach(el => {
    const depSec = Number(el.dataset.sec);
    const remSec = depSec - ns;

    if (remSec <= 0) {
      renderAll();
      return;
    }

    el.textContent = `（${formatCountdown(remSec)}）`;
    el.className = 'cdown' + (remSec < 120 ? ' urgent' : '');
  });
}

// ================================================================
// 毎分の正時に全体再描画 (2・3便目の残り時間を更新)
// ================================================================
function scheduleMinuteRender() {
  const now = new Date();
  const msToNextMin = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
  setTimeout(() => {
    renderAll();
    scheduleMinuteRender();
  }, msToNextMin);
}

// ================================================================
// 位置情報取得 / トグル
// ================================================================
function toggleLocation() {
  const btn = document.getElementById('locBtn');

  // オン状態なら → オフに戻す
  if (priority !== null) {
    priority = null;
    btn.textContent = '📍 現在地から自動選択';
    btn.classList.remove('on');
    renderAll();
    return;
  }

  // オフ状態なら → 位置情報取得
  if (!navigator.geolocation) {
    alert('このブラウザは位置情報に対応していません');
    return;
  }

  btn.textContent = '📍 取得中...';
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    pos => {
      const la = pos.coords.latitude;
      const ln = pos.coords.longitude;

      const dK = haversine(la, ln, STOPS.kasai.lat,    STOPS.kasai.lng);
      const dF = haversine(la, ln, STOPS.funabori.lat, STOPS.funabori.lng);
      const dS = haversine(la, ln, STOPS.sankaku.lat,  STOPS.sankaku.lng);

      if (dK <= dF && dK <= dS) {
        priority = 'kasai';
        btn.textContent = '📍 葛西駅付近（タップで解除）';
      } else if (dF <= dK && dF <= dS) {
        priority = 'funabori';
        btn.textContent = '📍 船堀駅付近（タップで解除）';
      } else {
        priority = 'sankaku';
        btn.textContent = '📍 三角付近（タップで解除）';
      }

      btn.classList.add('on');
      btn.disabled = false;
      renderAll();
    },
    err => {
      btn.textContent = '📍 現在地から自動選択';
      btn.disabled = false;
      alert('位置情報の取得に失敗しました\n' + err.message);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

renderAll();

})();

setInterval(tickCountdown, 1000);
